<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Colors</title>

    <style>

        body{
            background-color: lightgray;
            font-family: Arial, sans-serif;
        }

        h1{
            color: blue;
            text-align: center;
        }

        p{
            color: #cc0000;
            text-align: center;
        }

    </style>

</head>

<body>

    <h1>Colores en CSS</h1>

    <p>CSS permite cambiar el color del texto y del fondo de una página.</p>

    <p>Los colores ayudan a mejorar la presentación del sitio web.</p>

</body>

</html>
