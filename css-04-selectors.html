<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Selectors</title>

    <style>
        p {
            text-align: center;
            color: blue;
        }

        #parrafo-especial {
            color: red;
            font-size: 20px;
        }

        .destacado {
            background-color: lightyellow;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Ejemplos de selectores CSS</h1>

    <p>Este párrafo utiliza un selector de elemento.</p>

    <p id="parrafo-especial">
        Este párrafo utiliza un selector de identificador.
    </p>

    <p class="destacado">
        Este párrafo utiliza un selector de clase.
    </p>

    <h2 class="destacado">
        Esta etiqueta también utiliza la misma clase.
    </h2>

</body>

</html>
