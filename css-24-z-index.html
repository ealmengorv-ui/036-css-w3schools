<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>CSS Z-Index</title>

<style>

.caja1{

    position:absolute;

    left:60px;

    top:80px;

    width:180px;

    height:100px;

    background-color:lightcoral;

    z-index:1;

}

.caja2{

    position:absolute;

    left:100px;

    top:120px;

    width:180px;

    height:100px;

    background-color:lightgreen;

    z-index:2;

}

</style>

</head>

<body>

<div class="caja1">Caja 1</div>

<div class="caja2">Caja 2</div>

</body>

</html>
