<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>CSS Float</title>

<style>

img{

    float:left;

    margin-right:15px;

}

</style>

</head>

<body>

<h1>Ejemplo de Float</h1>

<img src="https://via.placeholder.com/120" alt="Imagen">

<p>

La imagen está alineada a la izquierda utilizando la propiedad float. El texto se acomoda automáticamente a su lado.

</p>

</body>

</html>
