<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CSS Tables</title>

<style>

table{
    width: 60%;
    border-collapse: collapse;
}

table, th, td{
    border: 1px solid black;
}

th{
    background-color: lightblue;
}

th, td{
    padding: 10px;
    text-align: center;
}

</style>

</head>

<body>

<h1>Tabla de estudiantes</h1>

<table>

<tr>
    <th>Nombre</th>
    <th>Curso</th>
</tr>

<tr>
    <td>Ana</td>
    <td>CSS</td>
</tr>

<tr>
    <td>Carlos</td>
    <td>HTML</td>
</tr>

</table>

</body>

</html>
