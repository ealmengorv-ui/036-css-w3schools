<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Combinators</title>

    <style>

        div p {

            color: blue;

            font-weight: bold;

        }

    </style>

</head>

<body>

    <h1>Combinadores CSS</h1>

    <div>

        <p>Este párrafo está dentro del div.</p>

    </div>

    <p>Este párrafo está fuera del div.</p>

</body>

</html>
