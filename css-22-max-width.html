<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CSS Max Width</title>

<style>

div{

    max-width:500px;

    margin:auto;

    border:2px solid blue;

    padding:20px;

}

</style>

</head>

<body>

<h1>Uso de Max-width</h1>

<div>

Este cuadro puede reducir su tamaño si la ventana del navegador es pequeña, pero nunca será más ancho de 500 píxeles.

</div>

</body>

</html>
