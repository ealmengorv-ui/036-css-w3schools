<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CSS Lists</title>

<style>

ul{
    list-style-type: square;
}

ol{
    list-style-type: upper-roman;
}

</style>

</head>

<body>

<h2>Lista de frutas</h2>

<ul>
    <li>Manzana</li>
    <li>Naranja</li>
    <li>Banano</li>
</ul>

<h2>Pasos</h2>

<ol>
    <li>Estudiar</li>
    <li>Practicar</li>
    <li>Entregar</li>
</ol>

</body>
</html>
