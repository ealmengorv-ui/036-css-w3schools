<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Comments</title>

    <style>

        /* Estilo general de la página */
        body {
            background-color: whitesmoke;
            font-family: Arial, sans-serif;
        }

        /* Estilo del título */
        h1 {
            color: darkblue;
            text-align: center;
        }

        /* Estilo de los párrafos */
        p {
            color: #444;
            text-align: center;
            font-size: 18px;
        }

    </style>

</head>

<body>

    <h1>Comentarios en CSS</h1>

    <p>Los comentarios ayudan a documentar el código.</p>

    <p>El navegador los ignora al mostrar la página.</p>

</body>

</html>
