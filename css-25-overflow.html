<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>CSS Overflow</title>

<style>

div{

    width:300px;

    height:120px;

    border:2px solid black;

    overflow:auto;

    padding:10px;

}

</style>

</head>

<body>

<div>

Este es un ejemplo del uso de overflow. Si el contenido supera el tamaño del cuadro, aparecerán barras de desplazamiento automáticamente. Esto permite visualizar todo el texto sin que salga del contenedor.

</div>

</body>

</html>
