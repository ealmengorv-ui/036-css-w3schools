<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Pseudo Element</title>

    <style>

        p::first-letter {

            font-size: 40px;

            color: red;

            font-weight: bold;

        }

    </style>

</head>

<body>

    <h1>Pseudo-elemento</h1>

    <p>

        Este párrafo tiene una primera letra con un estilo diferente gracias al pseudo-elemento.

    </p>

</body>

</html>
