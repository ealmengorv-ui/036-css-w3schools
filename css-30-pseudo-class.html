<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Pseudo Class</title>

    <style>

        button {

            padding: 10px 20px;

            background-color: steelblue;

            color: white;

            border: none;

        }

        button:hover {

            background-color: darkblue;

            cursor: pointer;

        }

    </style>

</head>

<body>

    <h1>Pseudo-clase Hover</h1>

    <button>Coloca el mouse aquí</button>

</body>

</html>
