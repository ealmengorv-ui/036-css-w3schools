<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>CSS Inline Block</title>

<style>

div{

    display:inline-block;

    width:150px;

    height:100px;

    background-color:lightblue;

    border:2px solid blue;

    margin:10px;

    text-align:center;

    line-height:100px;

}

</style>

</head>

<body>

<div>Bloque 1</div>

<div>Bloque 2</div>

<div>Bloque 3</div>

</body>

</html>
