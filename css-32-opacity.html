<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CSS Opacity</title>

    <style>

        img {

            width: 200px;

            opacity: 0.5;

        }

        img:hover {

            opacity: 1;

        }

    </style>

</head>

<body>

    <h1>Propiedad Opacity</h1>

    <img src="https://www.w3schools.com/css/img_forest.jpg" alt="Bosque">

</body>

</html>
